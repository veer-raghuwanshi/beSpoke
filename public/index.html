<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BeSpoke Drops</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <p class="eyebrow">BSP / LIMITED EDITIONS</p>
        <h1>Drop console</h1>
        <p class="lede">A small API explorer for the BeSpoke Drops backend.</p>
      </header>

      <section class="card settings">
        <label>User ID <input id="userId" value="alice" /></label>
        <label>Admin key <input id="adminKey" value="dev-admin" /></label>
        <button id="accountButton" class="secondary">Refresh my account</button>
      </section>

      <section class="grid">
        <form id="createForm" class="card">
          <h2>Create a drop</h2>
          <label
            >Item <input name="item" value="Midnight Bomber" required
          /></label>
          <label
            >Stock
            <input name="totalStock" type="number" min="1" value="5" required
          /></label>
          <label
            >Price (BSP)
            <input name="price" type="number" min="1" value="25" required
          /></label>
          <label
            >Max per user
            <input name="maxPerUser" type="number" min="1" value="2" required
          /></label>
          <label
            >Live at <input name="liveAt" type="datetime-local" required
          /></label>
          <button>Create drop</button>
        </form>

        <form id="claimForm" class="card">
          <h2>Claim stock</h2>
          <label
            >Drop ID <input name="dropId" placeholder="Mongo ObjectId" required
          /></label>
          <label
            >Quantity
            <input name="quantity" type="number" min="1" value="1" required
          /></label>
          <button>Reserve hold</button>
          <button id="getDropButton" type="button" class="secondary">
            Read drop
          </button>
          <button id="waitlistButton" type="button" class="secondary">
            Join waitlist
          </button>
        </form>

        <form id="holdForm" class="card">
          <h2>Manage a hold</h2>
          <label
            >Hold ID
            <input
              name="holdId"
              placeholder="Created after a successful claim"
              required
          /></label>
          <button type="submit">Confirm &amp; purchase</button>
          <button id="cancelHoldButton" type="button" class="secondary">
            Cancel hold
          </button>
        </form>
      </section>

      <section class="card">
        <h2>Response</h2>
        <pre id="output">Ready. Create a drop or enter a seeded drop ID.</pre>
      </section>

      <section class="card">
        <h2>API activity</h2>
        <ol id="activity" aria-live="polite"></ol>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
